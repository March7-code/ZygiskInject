ext {
    // Magisk Module
    magiskModuleId = "zygiskfrida"
    moduleName = "ZygiskFrida"
    moduleAuthor = "March7"
    moduleDescription = "Injects frida gadget via zygisk."
    moduleVersion = "v1.9.1"
    moduleVersionCode = 12

    // Riru
    moduleMinRiruApiVersion = 24
    moduleMinRiruVersionName = "24.0.0"
    moduleMaxRiruApiVersion = 26

    // Frida
    fridaVersion = "17.7.3"

    // Local gadget: set to true to use your own compiled frida-gadget .so files
    // instead of downloading from GitHub releases.
    // Place your .so files in localGadgetDir:
    //   libgadget.so                -> auto-detected as arm64
    //   frida-gadget-{arch}.so      -> explicit arch (arm64/arm/x86_64/x86)
    useLocalGadget = false
    localGadgetDir = "${rootDir}/local_gadget"
}
